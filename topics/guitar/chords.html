      <h1>常見和弦總覽</h1>
    </header>

    <article class="lesson-content">
      <p>
        這頁收錄目前課程教過的所有和弦，方便隨時回來複習指法，不用回去翻是哪一課教的。
        隨著課程進度（大和弦、七和弦等）會持續擴充。數字代表按弦手指：1=食指、2=中指、
        3=無名指、4=小指；空心圓圈代表該弦彈空弦，「×」代表該弦不彈。
      </p>

      <h2>開放和弦（第 3 課）</h2>
      <div class="chord-grid">
        <div class="chord-card"><div class="chord-diagram-slot" data-chord="C"></div></div>
        <div class="chord-card"><div class="chord-diagram-slot" data-chord="G"></div></div>
        <div class="chord-card"><div class="chord-diagram-slot" data-chord="D"></div></div>
        <div class="chord-card"><div class="chord-diagram-slot" data-chord="Em"></div></div>
        <div class="chord-card"><div class="chord-diagram-slot" data-chord="Am"></div></div>
        <div class="chord-card"><div class="chord-diagram-slot" data-chord="Dm"></div></div>
        <div class="chord-card"><div class="chord-diagram-slot" data-chord="A"></div></div>
        <div class="chord-card"><div class="chord-diagram-slot" data-chord="E"></div></div>
      </div>

      <h2>進行輔助和弦（第 8 課）</h2>
      <div class="chord-grid">
        <div class="chord-card"><div class="chord-diagram-slot" data-chord="Fsimple"></div></div>
      </div>

      <h2>封閉和弦／大和弦（第 18 課）</h2>
      <div class="chord-grid">
        <div class="chord-card"><div class="chord-diagram-slot" data-chord="F"></div></div>
        <div class="chord-card"><div class="chord-diagram-slot" data-chord="Bm"></div></div>
      </div>
